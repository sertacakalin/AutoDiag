server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA yönlendirme — bilinmeyen yollar index.html'e düşer.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik varlıklar için önbellek.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
