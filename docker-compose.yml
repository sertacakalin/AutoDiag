# AutoDiag — tam yığın (PostgreSQL+pgvector · backend · frontend)
# Çalıştırma:  docker compose up --build
# Arayüz: http://localhost:8080  ·  API: http://localhost:8000/docs

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: autodiag
      POSTGRES_PASSWORD: autodiag
      POSTGRES_DB: autodiag
    ports:
      # Host 5432 makinede başka bir Postgres tarafından kullanılıyor → 5433'e map.
      # Backend iç ağdan db:5432 kullanır, bu değişiklikten etkilenmez.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodiag"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://autodiag:autodiag@db:5432/autodiag
      # Türkçe-adapte model (autodiag-embed-tr-hn, 768d) — argo sorgularda isabetli.
      EMBED_DIM: "768"
      EMBEDDING_MODEL: "adapted"
      # Ücretsiz YEREL LLM (host'taki Ollama, aya-expanse Türkçe güçlü).
      # host.docker.internal: container'dan host'a erişim (Docker Desktop).
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "aya-expanse:8b"
      # HF cache yazılabilir yer (./models read-only bağlı; Dockerfile'daki
      # /models/.hf yazılamaz → rerank cross-encoder buraya iner).
      HF_HOME: "/app/.hf"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro
      # embedding.py modeli container'da /models'da arar (parents[3]=/) → buraya bağla.
      - ./models:/models:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
